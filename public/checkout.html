<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Kicks | Checkout Secure</title>
  <meta name="description" content="Secure payment and shipping checkout details for your sneaker order.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Navbar injected here by common.js -->
    <header></header>

    <div class="checkout-grid">
      <!-- Shipping & Payment Form -->
      <main>
        <h2 style="font-family: var(--font-display); margin-bottom: 2rem; font-size: 2rem;">SECURE <span>CHECKOUT</span></h2>
        
        <form id="checkout-form">
          <!-- Shipping Address -->
          <div style="background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 20px; padding: 2rem; margin-bottom: 2rem;">
            <h3 style="font-family: var(--font-display); margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 0.5rem;">SHIPPING ADDRESS</h3>
            <div class="form-group">
              <label class="form-label" for="ship-address">Street Address</label>
              <input type="text" id="ship-address" class="form-input" required placeholder="123 Neon Way">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div class="form-group">
                <label class="form-label" for="ship-city">City</label>
                <input type="text" id="ship-city" class="form-input" required placeholder="Cyber City">
              </div>
              <div class="form-group">
                <label class="form-label" for="ship-zip">Postal Code</label>
                <input type="text" id="ship-zip" class="form-input" required placeholder="10001">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="ship-country">Country</label>
              <input type="text" id="ship-country" class="form-input" required placeholder="United States">
            </div>
          </div>

          <!-- Payment Card Details -->
          <div style="background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 20px; padding: 2rem;">
            <h3 style="font-family: var(--font-display); margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 0.5rem;">PAYMENT DETAILS</h3>
            
            <!-- Mockup Card -->
            <div class="payment-card-mockup">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="card-chip"></div>
                <div style="font-family: var(--font-display); font-weight: bold; font-style: italic; color: var(--accent-volt);">DRIP CARD</div>
              </div>
              <div class="card-number" id="mock-card-number">•••• •••• •••• ••••</div>
              <div class="card-details-row">
                <div>
                  <div style="font-size: 0.65rem; text-transform: uppercase;">Cardholder</div>
                  <div id="mock-card-name" style="font-size: 0.95rem; font-weight: bold; color: var(--text-primary);">YOUR NAME</div>
                </div>
                <div>
                  <div style="font-size: 0.65rem; text-transform: uppercase;">Expiry</div>
                  <div id="mock-card-expiry" style="font-size: 0.95rem; font-weight: bold; color: var(--text-primary);">MM/YY</div>
                </div>
              </div>
            </div>

            <!-- Card Inputs -->
            <div class="form-group">
              <label class="form-label" for="card-holder">Cardholder Name</label>
              <input type="text" id="card-holder" class="form-input" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label class="form-label" for="card-number">Card Number</label>
              <input type="text" id="card-number-input" class="form-input" required placeholder="4000 1234 5678 9010" maxlength="19">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div class="form-group">
                <label class="form-label" for="card-expiry">Expiry Date</label>
                <input type="text" id="card-expiry-input" class="form-input" required placeholder="MM/YY" maxlength="5">
              </div>
              <div class="form-group">
                <label class="form-label" for="card-cvv">CVV</label>
                <input type="password" id="card-cvv-input" class="form-input" required placeholder="•••" maxlength="3">
              </div>
            </div>
          </div>
        </form>
      </main>

      <!-- Cart Item Review -->
      <aside>
        <div style="background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 20px; padding: 2rem; position: sticky; top: 100px;">
          <h3 class="summary-title" style="margin-bottom: 1rem;">ORDER REVIEW</h3>
          
          <div id="checkout-items-review" style="display: flex; flex-direction: column; gap: 1rem; max-height: 250px; overflow-y: auto; margin-bottom: 1.5rem; padding-right: 0.5rem;">
            <!-- Review items -->
          </div>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="checkout-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="checkout-shipping">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Estimated Tax (8%)</span>
            <span id="checkout-tax">$0.00</span>
          </div>
          <div class="summary-row total" style="margin-top: 1rem; padding-top: 1rem;">
            <span>Grand Total</span>
            <span id="checkout-total">$0.00</span>
          </div>

          <button type="submit" form="checkout-form" class="btn-primary" id="place-order-btn" style="width: 100%; justify-content: center; margin-top: 1.5rem;">PLACE ORDER <i class="fas fa-lock"></i></button>
        </div>
      </aside>
    </div>

    <!-- Footer injected here by common.js -->
    <footer></footer>
  </div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
